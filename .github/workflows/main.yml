name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -q

      - name: Debug Project Structure (Always Run)
        if: always() # This ensures it runs even if tests fail
        run: |
          echo "=== Project Directory Tree ==="
          ls -R
          echo "=== Checking specific files ==="
          [ -f data/raw/transactions_fraud.csv ] && echo "Data CSV exists" || echo "Data CSV MISSING"
          [ -f models/artifacts/fraud_model.joblib ] && echo "Model joblib exists" || echo "Model joblib MISSING"